<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Spinner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    background: #1a1a2e; color: #e0e0e0;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 30px 20px;
  }
  h1 { color: #cc7832; font-size: 24px; margin-bottom: 8px; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 30px; }
  .main { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 1000px; }
  .preview-section { display: flex; flex-direction: column; align-items: center; }
  .canvas-wrap {
    background: #0d0d1a; border: 1px solid #333; border-radius: 8px;
    padding: 20px; position: relative;
  }
  canvas { display: block; }
  .controls { display: flex; flex-direction: column; gap: 16px; min-width: 300px; }
  .control-group {
    background: #16213e; border: 1px solid #333; border-radius: 8px; padding: 16px;
  }
  .control-group h3 { color: #cc7832; font-size: 14px; margin-bottom: 12px; }
  .control-row { display: flex; align-items: center; margin-bottom: 8px; gap: 10px; }
  .control-row label { width: 80px; font-size: 12px; color: #aaa; flex-shrink: 0; }
  .control-row input[type="range"] { flex: 1; accent-color: #cc7832; }
  .control-row .value { width: 60px; text-align: right; font-size: 12px; color: #ffc864; }
  .control-row select {
    background: #0d0d1a; color: #e0e0e0; border: 1px solid #555;
    border-radius: 4px; padding: 4px 8px; font-family: inherit; font-size: 12px;
  }
  .control-row input[type="text"], .control-row input[type="number"] {
    background: #0d0d1a; color: #e0e0e0; border: 1px solid #555;
    border-radius: 4px; padding: 4px 8px; font-family: inherit; font-size: 12px; width: 100px;
  }
  .color-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .color-chip {
    width: 28px; height: 28px; border-radius: 4px; cursor: pointer;
    border: 2px solid transparent; transition: border-color 0.2s;
  }
  .color-chip.active { border-color: #fff; }
  .color-chip:hover { border-color: #888; }
  .btn {
    background: #cc7832; color: #fff; border: none; border-radius: 6px;
    padding: 10px 20px; font-family: inherit; font-size: 14px; cursor: pointer;
    transition: background 0.2s;
  }
  .btn:hover { background: #e08940; }
  .btn:disabled { background: #555; cursor: not-allowed; }
  .btn-row { display: flex; gap: 10px; margin-top: 10px; }
  .btn.secondary { background: #333; }
  .btn.secondary:hover { background: #444; }
  .status { font-size: 12px; color: #888; margin-top: 8px; min-height: 18px; }
  .input-section { margin-top: 20px; width: 100%; max-width: 600px; }
  .input-section input {
    width: 100%; background: #0d0d1a; color: #ffc864; border: 1px solid #555;
    border-radius: 6px; padding: 10px 14px; font-family: inherit; font-size: 16px;
    outline: none;
  }
  .input-section input:focus { border-color: #cc7832; }
  .input-section .hint { font-size: 11px; color: #666; margin-top: 6px; text-align: center; }
  .export-section { margin-top: 20px; text-align: center; }
  .progress-bar {
    width: 100%; height: 4px; background: #333; border-radius: 2px;
    margin-top: 8px; overflow: hidden; display: none;
  }
  .progress-bar .fill { height: 100%; background: #cc7832; width: 0%; transition: width 0.1s; }
  /* Preview area for transparent export */
  .canvas-wrap.transparent { background: repeating-conic-gradient(#2a2a3e 0% 25%, #1a1a2e 0% 50%) 50%/16px 16px; }
</style>
</head>
<body>

<h1>✦ Claude Code Spinner</h1>
<p class="subtitle">Claude Code 加载动画 · 支持 GIF 导出</p>

<div class="main">
  <!-- Preview -->
  <div class="preview-section">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="canvas" width="400" height="80"></canvas>
    </div>
    <div class="export-section">
      <div class="btn-row">
        <button class="btn" id="btnExportGif" onclick="exportGif()">导出 GIF</button>
        <button class="btn secondary" id="btnExportPng" onclick="exportPng()">导出 PNG</button>
        <button class="btn secondary" id="btnToggleBg" onclick="toggleBg()">透明背景</button>
      </div>
      <div class="status" id="status"></div>
      <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <!-- Input -->
    <div class="control-group">
      <h3>📝 文本</h3>
      <div class="control-row">
        <input type="text" id="inputText" placeholder="输入文字，留空则自动循环" oninput="onInputChange()">
      </div>
    </div>

    <!-- Colors -->
    <div class="control-group">
      <h3>🎨 颜色方案</h3>
      <div class="color-row" id="colorChips"></div>
      <div class="control-row" style="margin-top:10px">
        <label>自定义主色</label>
        <input type="color" id="customMsg" value="#cc7832" onchange="onCustomColor()">
        <label>高亮色</label>
        <input type="color" id="customShim" value="#ffc864" onchange="onCustomColor()">
      </div>
    </div>

    <!-- Shimmer -->
    <div class="control-group">
      <h3>✨ 扫光效果</h3>
      <div class="control-row">
        <label>方向</label>
        <select id="shimDir" onchange="onControlChange()">
          <option value="rtl">← 右到左 (RTL)</option>
          <option value="ltr">→ 左到右 (LTR)</option>
        </select>
      </div>
      <div class="control-row">
        <label>窗口宽度</label>
        <input type="range" id="shimWidth" min="1" max="10" value="3" oninput="onControlChange()">
        <span class="value" id="shimWidthVal">3</span>
      </div>
      <div class="control-row">
        <label>扫光速度</label>
        <input type="range" id="shimSpeed" min="0.5" max="5" step="0.1" value="1.5" oninput="onControlChange()">
        <span class="value" id="shimSpeedVal">1.5s</span>
      </div>
      <div class="control-row">
        <label>高亮强度</label>
        <input type="range" id="shimIntensity" min="0" max="100" value="100" oninput="onControlChange()">
        <span class="value" id="shimIntensityVal">100%</span>
      </div>
    </div>

    <!-- Animation -->
    <div class="control-group">
      <h3>🎬 动画</h3>
      <div class="control-row">
        <label>帧率</label>
        <input type="range" id="fps" min="5" max="30" value="15" oninput="onControlChange()">
        <span class="value" id="fpsVal">15 fps</span>
      </div>
      <div class="control-row">
        <label>GIF 时长</label>
        <input type="range" id="gifDuration" min="1" max="10" step="0.5" value="3" oninput="onControlChange()">
        <span class="value" id="gifDurationVal">3s</span>
      </div>
      <div class="control-row">
        <label>画布宽度</label>
        <input type="range" id="canvasWidth" min="200" max="800" step="50" value="400" oninput="onResize()">
        <span class="value" id="canvasWidthVal">400</span>
      </div>
    </div>
  </div>
</div>

<script>
// === Spinner Config ===
const SPINNER_CHARS = ['·', '✢', '✳', '✶', '✻', '✽'];
const SPINNER_FRAMES = [...SPINNER_CHARS, ...[...SPINNER_CHARS].reverse()];

const COLOR_SCHEMES = [
  { name: 'Claude Orange',  message: [204,120,50],  shimmer: [255,200,100] },
  { name: 'Electric Blue',  message: [50,150,255],  shimmer: [100,200,255] },
  { name: 'Neon Green',     message: [50,205,50],   shimmer: [150,255,150] },
  { name: 'Hot Pink',       message: [255,105,180], shimmer: [255,180,220] },
  { name: 'Purple Haze',    message: [148,103,189], shimmer: [200,160,255] },
  { name: 'Crimson Red',    message: [220,50,50],   shimmer: [255,120,120] },
  { name: 'Teal',           message: [0,180,180],   shimmer: [100,255,255] },
  { name: 'Amber',          message: [255,191,0],   shimmer: [255,230,100] },
];

const DEFAULT_VERBS = [
  'Accomplishing','Baking','Brewing','Calculating','Cascading','Clauding',
  'Cogitating','Composing','Computing','Crafting','Creating','Crunching',
  'Deciphering','Elucidating','Envisioning','Fermenting','Flowing','Forging',
  'Generating','Harmonizing','Hatching','Ideating','Imagining','Kneading',
  'Manifesting','Marinating','Nebulizing','Orchestrating','Percolating',
  'Pondering','Processing','Quantumizing','Ruminating','Synthesizing',
  'Thinking','Tinkering','Warping','Whisking','Wrangling','Zigzagging',
  '思考中','处理中','计算中','生成中','分析中','编译中','运行中','加载中',
];

// === State ===
let state = {
  text: '',
  verb: randomVerb(),
  tick: 0,
  colorIdx: 0,
  customMsg: null,
  customShim: null,
  shimDir: 'rtl',
  shimWidth: 3,
  shimSpeed: 1.5,
  shimIntensity: 1.0,
  fps: 15,
  gifDuration: 3,
  canvasWidth: 400,
  transparentBg: false,
};

let lastSweepId = -1;
let animId = null;
let lastFrameTime = 0;

// === DOM ===
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function randomVerb() {
  return DEFAULT_VERBS[Math.floor(Math.random() * DEFAULT_VERBS.length)];
}

function getMessageColor() {
  if (state.customMsg) return state.customMsg;
  return COLOR_SCHEMES[state.colorIdx].message;
}

function getShimmerColor() {
  if (state.customShim) return state.customShim;
  return COLOR_SCHEMES[state.colorIdx].shimmer;
}

// === Color utils ===
function rgb(c) { return `rgb(${c[0]},${c[1]},${c[2]})`; }
function rgba(c, a) { return `rgba(${c[0]},${c[1]},${c[2]},${a})`; }
function lerpColor(c1, c2, t) {
  return [
    Math.round(c1[0] + (c2[0]-c1[0])*t),
    Math.round(c1[1] + (c2[1]-c1[1])*t),
    Math.round(c1[2] + (c2[2]-c1[2])*t),
  ];
}

// === Shimmer math ===
function computeGlimmerIndex(tick, msgWidth, dir, padding) {
  const cycle = msgWidth + padding * 2;
  if (dir === 'ltr') return (tick % cycle) - padding;
  return msgWidth + padding - (tick % cycle);
}

function computeSegments(text, glimmerIdx, windowWidth) {
  const half = Math.floor(windowWidth / 2);
  const start = glimmerIdx - half;
  const end = glimmerIdx + (windowWidth - half - 1);
  if (start >= text.length || end < 0) return { before: text, shimmer: '', after: '' };
  const cs = Math.max(0, start);
  let before='', shimmer='', after='';
  for (let i = 0; i < text.length; i++) {
    if (i < cs) before += text[i];
    else if (i > end) after += text[i];
    else shimmer += text[i];
  }
  return { before, shimmer, after };
}

// === Pre-calculate fixed glyph width ===
let GLYPH_WIDTH = 0;
function measureGlyphWidth() {
  const c = document.createElement('canvas').getContext('2d');
  c.font = '28px "SF Mono", "Cascadia Code", "Fira Code", monospace';
  let max = 0;
  for (const ch of SPINNER_FRAMES) {
    max = Math.max(max, c.measureText(ch).width);
  }
  GLYPH_WIDTH = max + 2; // small padding
}
measureGlyphWidth();

// === Render ===
function render() {
  const W = state.canvasWidth;
  const H = 80;

  // Only resize canvas when needed (resizing clears content)
  if (canvas.width !== W || canvas.height !== H) {
    canvas.width = W;
    canvas.height = H;
  }

  // Background
  if (!state.transparentBg) {
    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(0, 0, W, H);
  } else {
    ctx.clearRect(0, 0, W, H);
  }

  const display = state.text.trim() || state.verb;
  const fullText = display + '…';
  const frame = Math.floor(state.tick / 2) % SPINNER_FRAMES.length;
  const spinnerChar = SPINNER_FRAMES[frame];
  const msgColor = getMessageColor();
  const shimColor = getShimmerColor();

  // Shimmer — use tick directly, scaled to text cycle length
  const cycleLen = fullText.length + 20; // matches shimmer padding
  const ticksPerSweep = Math.max(1, Math.round(state.shimSpeed * 1000 / (1000 / state.fps)));
  const scaledTick = state.tick * cycleLen / ticksPerSweep;
  const glimmerIdx = computeGlimmerIndex(scaledTick, fullText.length, state.shimDir, 10);
  const segs = computeSegments(fullText, glimmerIdx, state.shimWidth);

  // Intensity
  const effShimmer = state.shimIntensity >= 1
    ? shimColor
    : lerpColor(msgColor, shimColor, state.shimIntensity);

  // Draw
  ctx.textBaseline = 'middle';
  const y = H / 2;
  let x = 20;

  // Spinner glyph — draw at fixed position (centered in fixed-width box)
  ctx.font = '28px "SF Mono", "Cascadia Code", "Fira Code", monospace';
  ctx.fillStyle = rgb(msgColor);
  const charW = ctx.measureText(spinnerChar).width;
  ctx.fillText(spinnerChar, x + (GLYPH_WIDTH - charW) / 2, y);
  x += GLYPH_WIDTH + 10;

  // Shimmer text
  ctx.font = '22px "SF Mono", "Cascadia Code", "Fira Code", monospace';
  if (segs.before) {
    ctx.fillStyle = rgb(msgColor);
    ctx.fillText(segs.before, x, y);
    x += ctx.measureText(segs.before).width;
  }
  if (segs.shimmer) {
    ctx.fillStyle = rgb(effShimmer);
    ctx.fillText(segs.shimmer, x, y);
    x += ctx.measureText(segs.shimmer).width;
  }
  if (segs.after) {
    ctx.fillStyle = rgb(msgColor);
    ctx.fillText(segs.after, x, y);
  }
}

// === Animation loop ===
function animate(time) {
  if (time - lastFrameTime >= 1000 / state.fps) {
    lastFrameTime = time;

    const display = state.text.trim() || state.verb;
    const isUserInput = !!state.text.trim();

    // Auto-cycle verb
    if (!isUserInput) {
      const ticksPerSweep = Math.max(1, Math.round(state.shimSpeed * 1000 / (1000/state.fps)));
      const sweepId = Math.floor(state.tick / ticksPerSweep);
      if (sweepId > 0 && sweepId !== lastSweepId) {
        lastSweepId = sweepId;
        state.verb = randomVerb();
        state.tick = 0;
        lastSweepId = -1;
        // Reset tick tracking
      }
    }

    render();
    state.tick++;
  }
  animId = requestAnimationFrame(animate);
}

// === Controls ===
function initColorChips() {
  const container = document.getElementById('colorChips');
  COLOR_SCHEMES.forEach((scheme, i) => {
    const chip = document.createElement('div');
    chip.className = 'color-chip' + (i === 0 ? ' active' : '');
    chip.style.background = rgb(scheme.message);
    chip.title = scheme.name;
    chip.onclick = () => {
      state.colorIdx = i;
      state.customMsg = null;
      state.customShim = null;
      document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
    };
    container.appendChild(chip);
  });
}

function onInputChange() {
  state.text = document.getElementById('inputText').value;
}

function onCustomColor() {
  const msg = document.getElementById('customMsg').value;
  const shim = document.getElementById('customShim').value;
  state.customMsg = hexToRgb(msg);
  state.customShim = hexToRgb(shim);
  document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('active'));
}

function hexToRgb(hex) {
  const m = hex.match(/^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
  return m ? [parseInt(m[1],16), parseInt(m[2],16), parseInt(m[3],16)] : [204,120,50];
}

function rgbToHex(c) {
  return '#' + c.map(n => n.toString(16).padStart(2,'0')).join('');
}

function onControlChange() {
  state.shimDir = document.getElementById('shimDir').value;
  state.shimWidth = +document.getElementById('shimWidth').value;
  state.shimSpeed = +document.getElementById('shimSpeed').value;
  state.shimIntensity = +document.getElementById('shimIntensity').value / 100;
  state.fps = +document.getElementById('fps').value;
  state.gifDuration = +document.getElementById('gifDuration').value;

  document.getElementById('shimWidthVal').textContent = state.shimWidth;
  document.getElementById('shimSpeedVal').textContent = state.shimSpeed.toFixed(1) + 's';
  document.getElementById('shimIntensityVal').textContent = Math.round(state.shimIntensity*100) + '%';
  document.getElementById('fpsVal').textContent = state.fps + ' fps';
  document.getElementById('gifDurationVal').textContent = state.gifDuration + 's';
}

function onResize() {
  state.canvasWidth = +document.getElementById('canvasWidth').value;
  document.getElementById('canvasWidthVal').textContent = state.canvasWidth;
}

function toggleBg() {
  state.transparentBg = !state.transparentBg;
  document.getElementById('canvasWrap').classList.toggle('transparent', state.transparentBg);
  document.getElementById('btnToggleBg').textContent = state.transparentBg ? '不透明背景' : '透明背景';
}

// === GIF Export ===
function exportGif() {
  const btn = document.getElementById('btnExportGif');
  const status = document.getElementById('status');
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');

  btn.disabled = true;
  status.textContent = '正在生成 GIF...';
  bar.style.display = 'block';
  fill.style.width = '0%';

  const savedTick = state.tick;
  const totalFrames = Math.round(state.gifDuration * state.fps);
  const delayMs = Math.round(1000 / state.fps);
  const w = canvas.width, h = canvas.height;

  // Capture all frames as RGBA
  const frameData = [];
  for (let i = 0; i < totalFrames; i++) {
    state.tick = i;
    render();
    // Copy pixel data immediately (before next render overwrites)
    const imgData = ctx.getImageData(0, 0, w, h);
    frameData.push(new Uint8Array(imgData.data)); // copy to avoid shared buffer
    fill.style.width = Math.round((i+1) / totalFrames * 40) + '%';
  }

  // Encode async to not block UI
  setTimeout(() => {
    try {
      const gif = new GIFEncoder(w, h);
      gif.setRepeat(0); // loop forever
      gif.setDelay(delayMs);

      frameData.forEach((rgba, i) => {
        gif.addFrame(rgba, state.transparentBg);
        fill.style.width = Math.round(40 + (i+1) / totalFrames * 60) + '%';
      });

      const blob = gif.toBlob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'spinner.gif';
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      status.textContent = `✓ 已导出 (${totalFrames} 帧, ${state.gifDuration}s)`;
    } catch(e) {
      console.error(e);
      status.textContent = '导出失败: ' + e.message;
    }
    btn.disabled = false;
    bar.style.display = 'none';
    state.tick = savedTick;
  }, 50);
}

function exportPng() {
  render();
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'spinner.png';
  a.click();
}

// === GIF Encoder (GIF89a, per-frame Local Color Table, LZW) ===
class GIFEncoder {
  constructor(width, height) {
    this.width = width;
    this.height = height;
    this.delay = 100;
    this.repeat = 0;
    this.frames = [];
  }

  setDelay(ms) { this.delay = ms; }
  setRepeat(n) { this.repeat = n; }

  addFrame(rgba, transparent) {
    this.frames.push({rgba: new Uint8Array(rgba), transparent});
  }

  toBlob() {
    const buf = [];
    const w = this.width, h = this.height;

    // === Header ===
    this._str(buf, 'GIF89a');
    this._u16(buf, w);
    this._u16(buf, h);
    // No GCT — we use per-frame Local Color Tables
    // packed: GCT=0, color res=7, sort=0, GCT size=0
    buf.push(0x70); // 0_111_0_000
    buf.push(0);    // bg color index (unused without GCT)
    buf.push(0);    // pixel aspect ratio

    // === Netscape extension (loop) ===
    buf.push(0x21, 0xFF, 0x0B);
    this._str(buf, 'NETSCAPE2.0');
    buf.push(0x03, 0x01);
    this._u16(buf, this.repeat);
    buf.push(0x00);

    // === Frames ===
    for (let fi = 0; fi < this.frames.length; fi++) {
      const {rgba, transparent} = this.frames[fi];

      // Quantize this frame to 256 colors
      const {indexed, palette, bgIdx} = this._quantize(rgba, transparent);

      // Graphic Control Extension
      buf.push(0x21, 0xF9, 0x04);
      // disposal=2 (restore to bg), transparency flag
      const packed = (2 << 2) | (transparent ? 1 : 0);
      buf.push(packed);
      this._u16(buf, Math.round(this.delay / 10));
      buf.push(transparent ? bgIdx : 0); // transparent color index
      buf.push(0x00);

      // Image Descriptor with Local Color Table
      buf.push(0x2C);
      this._u16(buf, 0); // left
      this._u16(buf, 0); // top
      this._u16(buf, w);
      this._u16(buf, h);
      // packed: LCT=1, not interlaced, not sorted, LCT size=7 (256 entries)
      buf.push(0x87); // 1_000_0_111

      // Local Color Table (256 * 3 bytes)
      for (let i = 0; i < 256; i++) {
        buf.push(palette[i][0], palette[i][1], palette[i][2]);
      }

      // LZW Image Data
      this._lzw(buf, indexed, 8);
    }

    // === Trailer ===
    buf.push(0x3B);

    return new Blob([new Uint8Array(buf)], {type: 'image/gif'});
  }

  _quantize(rgba, transparent) {
    const total = this.width * this.height;

    // Collect all unique colors (exact RGB, no pre-quantization)
    const colorCounts = new Map();
    for (let i = 0; i < total; i++) {
      const r = rgba[i*4], g = rgba[i*4+1], b = rgba[i*4+2], a = rgba[i*4+3];
      if (transparent && a < 128) continue;
      const key = (r << 16) | (g << 8) | b;
      colorCounts.set(key, (colorCounts.get(key) || 0) + 1);
    }

    // Sort by frequency, take top 256
    const sorted = [...colorCounts.entries()].sort((a, b) => b[1] - a[1]);
    const maxColors = transparent ? 255 : 256;
    const topColors = sorted.slice(0, maxColors);

    // Build palette
    const palette = [];
    const keyToIdx = new Map();

    if (transparent) {
      palette.push([0, 0, 0]); // index 0 = transparent
    }

    for (const [key] of topColors) {
      const idx = palette.length;
      palette.push([(key >> 16) & 0xFF, (key >> 8) & 0xFF, key & 0xFF]);
      keyToIdx.set(key, idx);
    }

    // Pad to 256
    while (palette.length < 256) palette.push([0, 0, 0]);

    // Map pixels
    const indexed = new Uint8Array(total);
    for (let i = 0; i < total; i++) {
      const r = rgba[i*4], g = rgba[i*4+1], b = rgba[i*4+2], a = rgba[i*4+3];
      if (transparent && a < 128) {
        indexed[i] = 0;
      } else {
        const key = (r << 16) | (g << 8) | b;
        indexed[i] = keyToIdx.has(key) ? keyToIdx.get(key) :
          this._findNearest(r, g, b, palette, transparent ? 1 : 0);
      }
    }

    // Find background color index (darkest color, for disposal restore)
    let bgIdx = transparent ? 0 : 1;
    if (!transparent) {
      let minLum = Infinity;
      for (let i = 0; i < palette.length; i++) {
        const [r,g,b] = palette[i];
        const lum = r*0.299 + g*0.587 + b*0.114;
        if (lum < minLum) { minLum = lum; bgIdx = i; }
      }
    }

    return {indexed, palette, bgIdx};
  }

  _findNearest(r, g, b, palette, startIdx) {
    let best = startIdx, bestDist = Infinity;
    for (let i = startIdx; i < palette.length; i++) {
      const [pr, pg, pb] = palette[i];
      const d = (r-pr)**2 + (g-pg)**2 + (b-pb)**2;
      if (d < bestDist) { bestDist = d; best = i; }
    }
    return best;
  }

  _lzw(buf, pixels, minCodeSize) {
    buf.push(minCodeSize);

    const clearCode = 1 << minCodeSize;
    const eoiCode = clearCode + 1;

    const out = [];
    let bitBuf = 0, bitPos = 0;
    let codeSize = minCodeSize + 1;

    const emitCode = (code) => {
      bitBuf |= code << bitPos;
      bitPos += codeSize;
      while (bitPos >= 8) {
        out.push(bitBuf & 0xFF);
        bitBuf >>= 8;
        bitPos -= 8;
      }
    };

    let nextCode = eoiCode + 1;
    let table = new Map();
    for (let i = 0; i < clearCode; i++) table.set(String.fromCharCode(i), i);

    emitCode(clearCode);

    let cur = String.fromCharCode(pixels[0]);
    for (let i = 1; i < pixels.length; i++) {
      const ch = String.fromCharCode(pixels[i]);
      const combined = cur + ch;

      if (table.has(combined)) {
        cur = combined;
      } else {
        emitCode(table.get(cur));

        if (nextCode < 4096) {
          table.set(combined, nextCode);
          if (nextCode === (1 << codeSize) && codeSize < 12) codeSize++;
          nextCode++;
        } else {
          emitCode(clearCode);
          table = new Map();
          for (let j = 0; j < clearCode; j++) table.set(String.fromCharCode(j), j);
          nextCode = eoiCode + 1;
          codeSize = minCodeSize + 1;
        }
        cur = ch;
      }
    }
    emitCode(table.get(cur));
    emitCode(eoiCode);

    if (bitPos > 0) out.push(bitBuf & 0xFF);

    // Sub-blocks
    let pos = 0;
    while (pos < out.length) {
      const cs = Math.min(255, out.length - pos);
      buf.push(cs);
      for (let i = 0; i < cs; i++) buf.push(out[pos + i]);
      pos += cs;
    }
    buf.push(0x00);
  }

  _str(buf, s) { for (let i = 0; i < s.length; i++) buf.push(s.charCodeAt(i)); }
  _u16(buf, n) { buf.push(n & 0xFF, (n >> 8) & 0xFF); }
}

// === Init ===
initColorChips();
onControlChange();
animate(0);
</script>
