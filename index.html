<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Spinner</title>
<style>
  :root {
    --primary: #cc785c;
    --primary-active: #a9583e;
    --primary-disabled: #e6dfd8;
    --canvas: #faf9f5;
    --surface-soft: #f5f0e8;
    --surface-card: #efe9de;
    --surface-dark: #181715;
    --surface-dark-elevated: #252320;
    --surface-dark-soft: #1f1e1b;
    --hairline: #e6dfd8;
    --ink: #141413;
    --body-strong: #252523;
    --body: #3d3d3a;
    --muted: #6c6a64;
    --muted-soft: #8e8b82;
    --on-primary: #ffffff;
    --on-dark: #faf9f5;
    --on-dark-soft: #a09d96;
    --rounded-sm: 6px;
    --rounded-md: 8px;
    --rounded-lg: 12px;
    --rounded-xl: 16px;
    --font-display: 'Tiempos Headline', 'Cormorant Garamond', 'EB Garamond', 'Times New Roman', serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --font-code: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-body);
    background: var(--canvas);
    color: var(--body);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 96px 20px;
    line-height: 1.55;
  }
  h1 {
    font-family: var(--font-display);
    color: var(--ink); font-size: 48px; font-weight: 400;
    letter-spacing: -1px; margin-bottom: 12px; line-height: 1.1;
  }
  .subtitle { color: var(--muted); font-size: 18px; margin-bottom: 48px; }
  .main { display: flex; flex-direction: column; gap: 32px; align-items: center; width: 100%; max-width: 800px; }
  .preview-section { display: flex; flex-direction: column; align-items: center; width: 100%; }
  .canvas-wrap {
    background: var(--surface-dark); border-radius: var(--rounded-lg);
    padding: 32px; position: relative; width: 100%; display: flex; justify-content: center;
  }
  canvas { display: block; border-radius: 4px; }
  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
  .control-group {
    background: var(--surface-card); border-radius: var(--rounded-lg); padding: 24px;
  }
  .control-group.full-width { grid-column: 1 / -1; }
  .control-group h3 {
    color: var(--ink); font-size: 18px; font-weight: 500; margin-bottom: 20px;
  }
  .control-row { display: flex; align-items: center; margin-bottom: 12px; gap: 12px; }
  .control-row label { width: 80px; font-size: 14px; color: var(--body-strong); flex-shrink: 0; font-weight: 500; }
  .control-row input[type="range"] { flex: 1; accent-color: var(--primary); }
  .control-row .value { width: 50px; text-align: right; font-size: 14px; color: var(--muted); }
  .control-row select, .control-row input[type="text"] {
    background: var(--canvas); color: var(--ink); border: 1px solid var(--hairline);
    border-radius: var(--rounded-md); padding: 10px 14px;
    font-family: var(--font-body); font-size: 16px; width: 100%;
    outline: none; transition: border-color 0.2s;
  }
  .control-row select:focus, .control-row input[type="text"]:focus { border-color: var(--primary); }
  input[type="color"] {
    width: 32px; height: 32px; padding: 0;
    border: 1px solid var(--hairline); border-radius: var(--rounded-sm);
    background: var(--canvas); cursor: pointer;
  }
  .color-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
  .color-chip {
    width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: transform 0.1s, border-color 0.2s;
  }
  .color-chip.active { border-color: var(--ink); transform: scale(1.1); }

  /* Custom color circles (same as chips) */
  .custom-color-row { display: flex; gap: 16px; margin-top: 20px; align-items: center; }
  .custom-color-item { display: flex; align-items: center; gap: 8px; }
  .custom-color-item label { font-size: 13px; color: var(--muted); font-weight: 500; width: auto; }
  .color-circle-wrap {
    width: 32px; height: 32px; border-radius: 50%; overflow: hidden;
    border: 2px solid var(--hairline); position: relative; cursor: pointer;
  }
  .color-circle-wrap input[type="color"] {
    position: absolute; top: -4px; left: -4px;
    width: 40px; height: 40px; border: none; padding: 0; cursor: pointer;
    background: transparent;
  }

  /* Stepper input with +/- buttons */
  .stepper { display: flex; flex: 1; align-items: stretch; }
  .stepper-btn {
    width: 36px; height: 36px; border: 1px solid var(--hairline); background: var(--canvas);
    color: var(--body-strong); font-size: 18px; font-weight: 500; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; user-select: none; line-height: 1;
  }
  .stepper-btn:hover { background: var(--surface-soft); }
  .stepper-btn:active { background: var(--hairline); }
  .stepper-btn:first-child { border-radius: var(--rounded-md) 0 0 var(--rounded-md); }
  .stepper-btn:last-child { border-radius: 0 var(--rounded-md) var(--rounded-md) 0; }
  .stepper-input {
    width: 60px; height: 36px; border: 1px solid var(--hairline); border-left: none; border-right: none;
    background: var(--canvas); color: var(--ink); font-family: var(--font-code); font-size: 14px;
    text-align: center; outline: none; -moz-appearance: textfield;
  }
  .stepper-input::-webkit-inner-spin-button,
  .stepper-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .stepper-input:focus { background: var(--surface-soft); }

  /* Direction toggle buttons */
  .toggle-group { display: flex; gap: 0; flex: 1; }
  .toggle-btn {
    flex: 1; padding: 8px 12px; font-size: 13px; font-weight: 500;
    font-family: var(--font-body); border: 1px solid var(--hairline);
    background: var(--canvas); color: var(--muted); cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .toggle-btn:first-child { border-radius: var(--rounded-md) 0 0 var(--rounded-md); border-right: none; }
  .toggle-btn:last-child { border-radius: 0 var(--rounded-md) var(--rounded-md) 0; }
  .toggle-btn.active {
    background: var(--primary); color: var(--on-primary); border-color: var(--primary);
  }
  .btn {
    background: var(--primary); color: var(--on-primary); border: none;
    border-radius: var(--rounded-md); padding: 12px 20px;
    font-family: var(--font-body); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background 0.2s; height: 40px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .btn:hover { background: var(--primary-active); }
  .btn:disabled { background: var(--primary-disabled); color: var(--muted); cursor: not-allowed; }
  .btn-row { display: flex; gap: 12px; margin-top: 24px; }
  .btn.secondary { background: var(--canvas); color: var(--ink); border: 1px solid var(--hairline); }
  .btn.secondary:hover { background: var(--surface-card); }
  .status { font-size: 13px; color: var(--muted); margin-top: 12px; min-height: 18px; font-weight: 500; }
  .export-section { margin-top: 24px; text-align: center; width: 100%; }
  .progress-bar {
    width: 100%; height: 6px; background: var(--hairline); border-radius: 9999px;
    margin-top: 12px; overflow: hidden; display: none;
  }
  .progress-bar .fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.1s; }
  .canvas-wrap.transparent {
    background: repeating-conic-gradient(var(--surface-dark-elevated) 0% 25%, var(--surface-dark) 0% 50%) 50%/16px 16px;
  }
</style>
</head>
<body>

<h1>✦ Claude Code Spinner</h1>
<p class="subtitle">Warm editorial interface · GIF export tool</p>

<div class="main">
  <div class="preview-section">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="canvas" width="400" height="80"></canvas>
    </div>
    <div class="export-section">
      <div class="btn-row">
        <button class="btn" id="btnExportGif" onclick="exportGif()">Export GIF</button>
        <button class="btn secondary" id="btnExportPng" onclick="exportPng()">Export PNG</button>
        <button class="btn secondary" id="btnToggleBg" onclick="toggleBg()">Transparent</button>
      </div>
      <div class="status" id="status"></div>
      <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
    </div>
  </div>

  <div class="controls">
    <div class="control-group full-width">
      <h3>Message</h3>
      <div class="control-row">
        <input type="text" id="inputText" placeholder="Leave empty for auto-cycle..." oninput="onInputChange()">
      </div>
    </div>

    <div class="control-group">
      <h3>Brand Accent</h3>
      <div class="color-row" id="colorChips"></div>
      <div class="custom-color-row">
        <div class="custom-color-item">
          <label>Base</label>
          <div class="color-circle-wrap">
            <input type="color" id="customMsg" value="#cc785c" onchange="onCustomColor()" oninput="onCustomColor()">
          </div>
        </div>
        <div class="custom-color-item">
          <label>Highlight</label>
          <div class="color-circle-wrap">
            <input type="color" id="customShim" value="#f5f0e8" onchange="onCustomColor()" oninput="onCustomColor()">
          </div>
        </div>
      </div>
    </div>

    <div class="control-group">
      <h3>Shimmer Effect</h3>
      <div class="control-row">
        <label>Direction</label>
        <div class="toggle-group">
          <button class="toggle-btn" id="btnRtl" onclick="setDir('rtl')">← RTL</button>
          <button class="toggle-btn" id="btnLtr" onclick="setDir('ltr')">LTR →</button>
        </div>
      </div>
      <div class="control-row">
        <label>Window</label>
        <input type="range" id="shimWidth" min="1" max="10" value="3" oninput="onControlChange()">
        <span class="value" id="shimWidthVal">3</span>
      </div>
      <div class="control-row">
        <label>Speed</label>
        <input type="range" id="shimSpeed" min="0.5" max="5" step="0.1" value="1.5" oninput="onControlChange()">
        <span class="value" id="shimSpeedVal">1.5s</span>
      </div>
      <div class="control-row">
        <label>Intensity</label>
        <input type="range" id="shimIntensity" min="0" max="100" value="100" oninput="onControlChange()">
        <span class="value" id="shimIntensityVal">100%</span>
      </div>
    </div>

    <div class="control-group full-width">
      <h3>Export Settings</h3>
      <div class="control-row">
        <label>Font Size</label>
        <div class="stepper">
          <button class="stepper-btn" onclick="stepVal('fontSize',-2)">−</button>
          <input type="number" class="stepper-input" id="fontSize" min="8" max="40" value="16" onchange="onControlChange()">
          <button class="stepper-btn" onclick="stepVal('fontSize',2)">+</button>
        </div>
      </div>
      <div class="control-row">
        <label>Framerate</label>
        <div class="stepper">
          <button class="stepper-btn" onclick="stepVal('fps',-5)">−</button>
          <input type="number" class="stepper-input" id="fps" min="1" max="60" value="15" onchange="onControlChange()">
          <button class="stepper-btn" onclick="stepVal('fps',5)">+</button>
        </div>
      </div>
      <div class="control-row">
        <label>Duration</label>
        <div class="stepper">
          <button class="stepper-btn" onclick="stepVal('gifDuration',-0.5)">−</button>
          <input type="number" class="stepper-input" id="gifDuration" min="0.5" max="20" step="0.5" value="3" onchange="onControlChange()">
          <button class="stepper-btn" onclick="stepVal('gifDuration',0.5)">+</button>
        </div>
      </div>
      <div class="control-row">
        <label>Width</label>
        <div class="stepper">
          <button class="stepper-btn" onclick="stepCanvas('w',-50)">−</button>
          <input type="number" class="stepper-input" id="canvasWidth" min="100" max="1200" step="10" value="400" onchange="onResize()">
          <button class="stepper-btn" onclick="stepCanvas('w',50)">+</button>
        </div>
      </div>
      <div class="control-row">
        <label>Height</label>
        <div class="stepper">
          <button class="stepper-btn" onclick="stepCanvas('h',-10)">−</button>
          <input type="number" class="stepper-input" id="canvasHeight" min="40" max="400" step="5" value="80" onchange="onResize()">
          <button class="stepper-btn" onclick="stepCanvas('h',10)">+</button>
        </div>
      </div>
      <div class="control-row">
        <label>GIF Size</label>
        <span class="value" id="gifSizeEst" style="width:auto;color:var(--body-strong)">400 × 80</span>
      </div>
    </div>
  </div>
</div>

<script>
// === Spinner Config ===
const SPINNER_CHARS = ['·', '✢', '✳', '✶', '✻', '✽'];
const SPINNER_FRAMES = [...SPINNER_CHARS, ...[...SPINNER_CHARS].reverse()];

const COLOR_SCHEMES = [
  { name: 'Anthropic Coral', message: [204,120,92],  shimmer: [250,249,245] },
  { name: 'Warm Amber',      message: [232,165,90],  shimmer: [255,255,255] },
  { name: 'Teal',            message: [93,184,166],  shimmer: [255,255,255] },
  { name: 'Canvas Muted',    message: [142,139,130], shimmer: [250,249,245] },
  { name: 'On-Dark Cream',   message: [250,249,245], shimmer: [204,120,92]  },
];

const DEFAULT_VERBS = [
  'Accomplishing','Baking','Brewing','Calculating','Cascading','Clauding',
  'Cogitating','Composing','Computing','Crafting','Creating','Crunching',
  'Deciphering','Elucidating','Envisioning','Fermenting','Flowing','Forging',
  'Generating','Harmonizing','Hatching','Ideating','Imagining','Kneading',
  'Manifesting','Marinating','Nebulizing','Orchestrating','Percolating',
  'Pondering','Processing','Quantumizing','Ruminating','Synthesizing',
  'Thinking','Tinkering','Warping','Whisking','Wrangling','Zigzagging',
];

// === State ===
let state = {
  text: '', verb: randomVerb(), tick: 0,
  colorIdx: 0, customMsg: null, customShim: null,
  shimDir: 'rtl', shimWidth: 3, shimSpeed: 1.5, shimIntensity: 1.0,
  fps: 15, gifDuration: 3, canvasWidth: 400, canvasHeight: 80, transparentBg: false,
  fontSize: 16,
};
let lastSweepId = -1, lastFrameTime = 0;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function randomVerb() { return DEFAULT_VERBS[Math.floor(Math.random() * DEFAULT_VERBS.length)]; }
function getMessageColor() { return state.customMsg || COLOR_SCHEMES[state.colorIdx].message; }
function getShimmerColor() { return state.customShim || COLOR_SCHEMES[state.colorIdx].shimmer; }

function rgb(c) { return `rgb(${c[0]},${c[1]},${c[2]})`; }
function lerpColor(c1, c2, t) {
  return [Math.round(c1[0]+(c2[0]-c1[0])*t), Math.round(c1[1]+(c2[1]-c1[1])*t), Math.round(c1[2]+(c2[2]-c1[2])*t)];
}

function computeGlimmerIndex(tick, msgWidth, dir, padding) {
  const cycle = msgWidth + padding * 2;
  return dir === 'ltr' ? (tick % cycle) - padding : msgWidth + padding - (tick % cycle);
}
function computeSegments(text, glimmerIdx, windowWidth) {
  const half = Math.floor(windowWidth / 2);
  const start = glimmerIdx - half, end = glimmerIdx + (windowWidth - half - 1);
  if (start >= text.length || end < 0) return { before: text, shimmer: '', after: '' };
  const cs = Math.max(0, start);
  let before='', shimmer='', after='';
  for (let i = 0; i < text.length; i++) {
    if (i < cs) before += text[i]; else if (i > end) after += text[i]; else shimmer += text[i];
  }
  return { before, shimmer, after };
}

// Glyph width cache (recalculated on font size change)
let GLYPH_WIDTH = 0;
function measureGlyphWidth(fontSize) {
  const glyphSize = Math.round(fontSize * 1.5);
  const c = document.createElement('canvas').getContext('2d');
  c.font = `${glyphSize}px "JetBrains Mono", monospace`;
  let max = 0;
  for (const ch of SPINNER_FRAMES) max = Math.max(max, c.measureText(ch).width);
  GLYPH_WIDTH = max + 2;
}
measureGlyphWidth(state.fontSize);

// === Render ===
function render() {
  const W = state.canvasWidth;
  const H = state.canvasHeight;
  if (canvas.width !== W || canvas.height !== H) { canvas.width = W; canvas.height = H; }

  if (!state.transparentBg) { ctx.fillStyle = '#181715'; ctx.fillRect(0, 0, W, H); }
  else { ctx.clearRect(0, 0, W, H); }

  const display = state.text.trim() || state.verb;
  const fullText = display + '…';
  const frame = Math.floor(state.tick / 2) % SPINNER_FRAMES.length;
  const spinnerChar = SPINNER_FRAMES[frame];
  const msgColor = getMessageColor();
  const shimColor = getShimmerColor();

  const cycleLen = fullText.length + 20;
  const ticksPerSweep = Math.max(1, Math.round(state.shimSpeed * 1000 / (1000 / state.fps)));
  const scaledTick = state.tick * cycleLen / ticksPerSweep;
  const glimmerIdx = computeGlimmerIndex(scaledTick, fullText.length, state.shimDir, 10);
  const segs = computeSegments(fullText, glimmerIdx, state.shimWidth);
  const effShimmer = state.shimIntensity >= 1 ? shimColor : lerpColor(msgColor, shimColor, state.shimIntensity);

  ctx.textBaseline = 'middle';
  const y = H / 2;
  let x = 24;
  const fs = state.fontSize;
  const glyphSize = Math.round(fs * 1.5);

  // Glyph
  ctx.font = `${glyphSize}px "JetBrains Mono", monospace`;
  ctx.fillStyle = rgb(msgColor);
  const charW = ctx.measureText(spinnerChar).width;
  ctx.fillText(spinnerChar, x + (GLYPH_WIDTH - charW) / 2, y);
  x += GLYPH_WIDTH + 16;

  // Shimmer text
  ctx.font = `${fs}px "JetBrains Mono", monospace`;
  if (segs.before) { ctx.fillStyle = rgb(msgColor); ctx.fillText(segs.before, x, y); x += ctx.measureText(segs.before).width; }
  if (segs.shimmer) { ctx.fillStyle = rgb(effShimmer); ctx.fillText(segs.shimmer, x, y); x += ctx.measureText(segs.shimmer).width; }
  if (segs.after) { ctx.fillStyle = rgb(msgColor); ctx.fillText(segs.after, x, y); }
}

// === Animation ===
function animate(time) {
  if (time - lastFrameTime >= 1000 / state.fps) {
    lastFrameTime = time;
    const isUserInput = !!state.text.trim();
    if (!isUserInput) {
      const ticksPerSweep = Math.max(1, Math.round(state.shimSpeed * 1000 / (1000/state.fps)));
      const sweepId = Math.floor(state.tick / ticksPerSweep);
      if (sweepId > 0 && sweepId !== lastSweepId) {
        lastSweepId = sweepId; state.verb = randomVerb(); state.tick = 0; lastSweepId = -1;
      }
    }
    render(); state.tick++;
  }
  requestAnimationFrame(animate);
}

// === Controls ===
function initColorChips() {
  const container = document.getElementById('colorChips');
  COLOR_SCHEMES.forEach((scheme, i) => {
    const chip = document.createElement('div');
    chip.className = 'color-chip' + (i === 0 ? ' active' : '');
    chip.style.background = rgb(scheme.message);
    chip.title = scheme.name;
    chip.onclick = () => {
      state.colorIdx = i; state.customMsg = null; state.customShim = null;
      document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
    };
    container.appendChild(chip);
  });
}
function onInputChange() { state.text = document.getElementById('inputText').value; }
function onCustomColor() {
  state.customMsg = hexToRgb(document.getElementById('customMsg').value);
  state.customShim = hexToRgb(document.getElementById('customShim').value);
  document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('active'));
}
function hexToRgb(hex) {
  const m = hex.match(/^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
  return m ? [parseInt(m[1],16), parseInt(m[2],16), parseInt(m[3],16)] : [204,120,92];
}
function setDir(dir) {
  state.shimDir = dir;
  document.getElementById('btnRtl').classList.toggle('active', dir === 'rtl');
  document.getElementById('btnLtr').classList.toggle('active', dir === 'ltr');
}
function onControlChange() {
  state.shimWidth = +document.getElementById('shimWidth').value;
  state.shimSpeed = +document.getElementById('shimSpeed').value;
  state.shimIntensity = +document.getElementById('shimIntensity').value / 100;
  state.fps = +document.getElementById('fps').value;
  state.gifDuration = +document.getElementById('gifDuration').value;
  const newFontSize = +document.getElementById('fontSize').value;
  if (newFontSize !== state.fontSize) {
    state.fontSize = newFontSize;
    measureGlyphWidth(newFontSize);
  }
  document.getElementById('shimWidthVal').textContent = state.shimWidth;
  document.getElementById('shimSpeedVal').textContent = state.shimSpeed.toFixed(1) + 's';
  document.getElementById('shimIntensityVal').textContent = Math.round(state.shimIntensity*100) + '%';
  updateGifSizeEstimate();
}

function updateGifSizeEstimate() {
  document.getElementById('gifSizeEst').textContent = `${state.canvasWidth} × ${state.canvasHeight}`;
}
function stepVal(id, delta) {
  const el = document.getElementById(id);
  const step = +el.step || 1;
  const newVal = Math.round((+el.value + delta) / step) * step;
  el.value = Math.max(+el.min, Math.min(+el.max, newVal));
  onControlChange();
}
function stepCanvas(dim, delta) {
  if (dim === 'w') {
    const el = document.getElementById('canvasWidth');
    el.value = Math.max(+el.min, Math.min(+el.max, +el.value + delta));
    state.canvasWidth = +el.value;
  } else {
    const el = document.getElementById('canvasHeight');
    el.value = Math.max(+el.min, Math.min(+el.max, +el.value + delta));
    state.canvasHeight = +el.value;
  }
  updateGifSizeEstimate();
}
function onResize() {
  state.canvasWidth = +document.getElementById('canvasWidth').value;
  state.canvasHeight = +document.getElementById('canvasHeight').value;
  updateGifSizeEstimate();
}
function toggleBg() {
  state.transparentBg = !state.transparentBg;
  document.getElementById('canvasWrap').classList.toggle('transparent', state.transparentBg);
  document.getElementById('btnToggleBg').textContent = state.transparentBg ? 'Opaque' : 'Transparent';
}

// === GIF Export ===
function exportGif() {
  const btn = document.getElementById('btnExportGif');
  const status = document.getElementById('status');
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  btn.disabled = true; status.textContent = 'Generating GIF...';
  bar.style.display = 'block'; fill.style.width = '0%';

  const savedTick = state.tick;
  const totalFrames = Math.round(state.gifDuration * state.fps);
  const delayMs = Math.round(1000 / state.fps);
  const w = canvas.width, h = canvas.height;

  const frameData = [];
  for (let i = 0; i < totalFrames; i++) {
    state.tick = i; render();
    frameData.push(new Uint8Array(ctx.getImageData(0, 0, w, h).data));
    fill.style.width = Math.round((i+1) / totalFrames * 40) + '%';
  }

  setTimeout(() => {
    try {
      const gif = new GIFEncoder(w, h);
      gif.setRepeat(0); gif.setDelay(delayMs);
      frameData.forEach((rgba, i) => {
        gif.addFrame(rgba, state.transparentBg);
        fill.style.width = Math.round(40 + (i+1) / totalFrames * 60) + '%';
      });
      const blob = gif.toBlob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'claude-spinner.gif'; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      status.textContent = `✓ Exported (${w}×${h}, ${totalFrames} frames, ${state.gifDuration}s)`;
    } catch(e) { console.error(e); status.textContent = 'Export failed: ' + e.message; }
    btn.disabled = false; bar.style.display = 'none'; state.tick = savedTick;
  }, 50);
}

function exportPng() {
  render();
  const a = document.createElement('a'); a.href = canvas.toDataURL('image/png'); a.download = 'claude-spinner.png'; a.click();
}

// === GIF Encoder (per-frame Local Color Table, LZW) ===
class GIFEncoder {
  constructor(w, h) { this.width = w; this.height = h; this.delay = 100; this.repeat = 0; this.frames = []; }
  setDelay(ms) { this.delay = ms; }
  setRepeat(n) { this.repeat = n; }
  addFrame(rgba, transparent) { this.frames.push({ rgba: new Uint8Array(rgba), transparent }); }

  toBlob() {
    const buf = [], w = this.width, h = this.height;
    this._s(buf, 'GIF89a'); this._u16(buf, w); this._u16(buf, h);
    buf.push(0x70, 0, 0); // no GCT
    buf.push(0x21, 0xFF, 0x0B); this._s(buf, 'NETSCAPE2.0');
    buf.push(0x03, 0x01); this._u16(buf, this.repeat); buf.push(0x00);

    for (const { rgba, transparent } of this.frames) {
      const { indexed, palette, bgIdx } = this._quantize(rgba, transparent);

      // GCE
      buf.push(0x21, 0xF9, 0x04);
      buf.push((2 << 2) | (transparent ? 1 : 0));
      this._u16(buf, Math.round(this.delay / 10));
      buf.push(transparent ? bgIdx : 0);
      buf.push(0x00);

      // Image Descriptor + LCT
      buf.push(0x2C);
      this._u16(buf, 0); this._u16(buf, 0); this._u16(buf, w); this._u16(buf, h);
      buf.push(0x87); // LCT=1, 256 entries
      for (let i = 0; i < 256; i++) buf.push(palette[i][0], palette[i][1], palette[i][2]);

      this._lzw(buf, indexed, 8);
    }

    buf.push(0x3B);
    return new Blob([new Uint8Array(buf)], { type: 'image/gif' });
  }

  _quantize(rgba, transparent) {
    const total = this.width * this.height;
    const counts = new Map();
    for (let i = 0; i < total; i++) {
      const r = rgba[i*4], g = rgba[i*4+1], b = rgba[i*4+2], a = rgba[i*4+3];
      if (transparent && a < 128) continue;
      const key = (r << 16) | (g << 8) | b;
      counts.set(key, (counts.get(key) || 0) + 1);
    }

    const sorted = [...counts.entries()].sort((a, b) => b[1] - a[1]);
    const top = sorted.slice(0, transparent ? 255 : 256);
    const palette = [], keyToIdx = new Map();
    if (transparent) palette.push([0, 0, 0]);
    for (const [key] of top) {
      keyToIdx.set(key, palette.length);
      palette.push([(key >> 16) & 0xFF, (key >> 8) & 0xFF, key & 0xFF]);
    }
    while (palette.length < 256) palette.push([0, 0, 0]);

    const indexed = new Uint8Array(total);
    for (let i = 0; i < total; i++) {
      const r = rgba[i*4], g = rgba[i*4+1], b = rgba[i*4+2], a = rgba[i*4+3];
      if (transparent && a < 128) { indexed[i] = 0; continue; }
      const key = (r << 16) | (g << 8) | b;
      indexed[i] = keyToIdx.has(key) ? keyToIdx.get(key) : this._nearest(r, g, b, palette, transparent ? 1 : 0);
    }

    let bgIdx = transparent ? 0 : 1;
    if (!transparent) {
      let minLum = Infinity;
      for (let i = 0; i < palette.length; i++) {
        const [r, g, b] = palette[i];
        const lum = r * 0.299 + g * 0.587 + b * 0.114;
        if (lum < minLum) { minLum = lum; bgIdx = i; }
      }
    }
    return { indexed, palette, bgIdx };
  }

  _nearest(r, g, b, palette, start) {
    let best = start, bestD = Infinity;
    for (let i = start; i < palette.length; i++) {
      const [pr, pg, pb] = palette[i];
      const d = (r-pr)**2 + (g-pg)**2 + (b-pb)**2;
      if (d < bestD) { bestD = d; best = i; }
    }
    return best;
  }

  _lzw(buf, pixels, minCodeSize) {
    buf.push(minCodeSize);
    const clear = 1 << minCodeSize, eoi = clear + 1;
    const out = []; let bitBuf = 0, bitPos = 0, codeSize = minCodeSize + 1;
    let nextCode = eoi + 1, table = new Map();
    for (let i = 0; i < clear; i++) table.set(String.fromCharCode(i), i);

    const emit = code => {
      bitBuf |= code << bitPos; bitPos += codeSize;
      while (bitPos >= 8) { out.push(bitBuf & 0xFF); bitBuf >>= 8; bitPos -= 8; }
    };

    emit(clear);
    let cur = String.fromCharCode(pixels[0]);
    for (let i = 1; i < pixels.length; i++) {
      const ch = String.fromCharCode(pixels[i]), combined = cur + ch;
      if (table.has(combined)) { cur = combined; }
      else {
        emit(table.get(cur));
        if (nextCode < 4096) {
          table.set(combined, nextCode);
          if (nextCode === (1 << codeSize) && codeSize < 12) codeSize++;
          nextCode++;
        } else {
          emit(clear); table = new Map();
          for (let j = 0; j < clear; j++) table.set(String.fromCharCode(j), j);
          nextCode = eoi + 1; codeSize = minCodeSize + 1;
        }
        cur = ch;
      }
    }
    emit(table.get(cur)); emit(eoi);
    if (bitPos > 0) out.push(bitBuf & 0xFF);

    let pos = 0;
    while (pos < out.length) {
      const cs = Math.min(255, out.length - pos);
      buf.push(cs); for (let i = 0; i < cs; i++) buf.push(out[pos + i]);
      pos += cs;
    }
    buf.push(0x00);
  }

  _s(buf, s) { for (let i = 0; i < s.length; i++) buf.push(s.charCodeAt(i)); }
  _u16(buf, n) { buf.push(n & 0xFF, (n >> 8) & 0xFF); }
}

// === Init ===
initColorChips(); setDir('rtl'); onControlChange(); animate(0);
