<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Spinner</title>
<style>
  /* === CSS Variables based on Claude.com Design System === */
  :root {
    /* Brand & Accent */
    --primary: #cc785c;
    --primary-active: #a9583e;
    --primary-disabled: #e6dfd8;
    
    /* Surface */
    --canvas: #faf9f5;
    --surface-soft: #f5f0e8;
    --surface-card: #efe9de;
    --surface-dark: #181715;
    --surface-dark-elevated: #252320;
    --surface-dark-soft: #1f1e1b;
    --hairline: #e6dfd8;
    
    /* Text */
    --ink: #141413;
    --body-strong: #252523;
    --body: #3d3d3a;
    --muted: #6c6a64;
    --muted-soft: #8e8b82;
    --on-primary: #ffffff;
    --on-dark: #faf9f5;
    --on-dark-soft: #a09d96;

    /* Shapes */
    --rounded-sm: 6px;
    --rounded-md: 8px;
    --rounded-lg: 12px;
    --rounded-xl: 16px;

    /* Typography stacks */
    --font-display: 'Tiempos Headline', 'Cormorant Garamond', 'EB Garamond', 'Times New Roman', serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --font-code: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: var(--font-body);
    background: var(--canvas);
    color: var(--body);
    min-height: 100vh; 
    display: flex; 
    flex-direction: column; 
    align-items: center;
    padding: 96px 20px; /* spacing.section */
    line-height: 1.55;
  }

  h1 { 
    font-family: var(--font-display);
    color: var(--ink); 
    font-size: 48px; /* display-lg */
    font-weight: 400;
    letter-spacing: -1px;
    margin-bottom: 12px; 
    line-height: 1.1;
  }

  .subtitle { 
    color: var(--muted); 
    font-size: 18px; /* title-md */
    margin-bottom: 48px; 
  }

  .main { 
    display: flex; 
    gap: 32px; 
    flex-wrap: wrap; 
    justify-content: center; 
    width: 100%; 
    max-width: 1000px; 
  }

  .preview-section { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
  }

  /* Dark navy product surfaces */
  .canvas-wrap {
    background: var(--surface-dark); 
    border-radius: var(--rounded-lg);
    padding: 32px; /* spacing.xl */
    position: relative;
    box-shadow: none; /* flat color block */
  }

  canvas { display: block; border-radius: 4px; }

  .controls { 
    display: flex; 
    flex-direction: column; 
    gap: 24px; 
    min-width: 320px; 
  }

  /* Light cream cards */
  .control-group {
    background: var(--surface-card); 
    border-radius: var(--rounded-lg); 
    padding: 32px; /* spacing.xl */
  }

  .control-group h3 { 
    color: var(--ink); 
    font-size: 18px; /* title-md */
    font-weight: 500;
    margin-bottom: 20px; 
  }

  .control-row { 
    display: flex; 
    align-items: center; 
    margin-bottom: 12px; 
    gap: 12px; 
  }

  .control-row label { 
    width: 80px; 
    font-size: 14px; 
    color: var(--body-strong); 
    flex-shrink: 0; 
    font-weight: 500;
  }

  .control-row input[type="range"] { 
    flex: 1; 
    accent-color: var(--primary); 
  }

  .control-row .value { 
    width: 50px; 
    text-align: right; 
    font-size: 14px; 
    color: var(--muted); 
  }

  /* Inputs & Selects */
  .control-row select, .control-row input[type="text"], .control-row input[type="number"] {
    background: var(--canvas); 
    color: var(--ink); 
    border: 1px solid var(--hairline);
    border-radius: var(--rounded-md); 
    padding: 10px 14px; 
    font-family: var(--font-body); 
    font-size: 16px; 
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }

  .control-row select:focus, .control-row input[type="text"]:focus, .control-row input[type="number"]:focus {
    border-color: var(--primary);
  }

  /* Custom Color Inputs */
  input[type="color"] {
    width: 32px;
    height: 32px;
    padding: 0;
    border: 1px solid var(--hairline);
    border-radius: var(--rounded-sm);
    background: var(--canvas);
    cursor: pointer;
  }

  .color-row { 
    display: flex; 
    gap: 12px; 
    flex-wrap: wrap; 
    margin-top: 12px; 
  }

  .color-chip {
    width: 32px; 
    height: 32px; 
    border-radius: var(--rounded-full, 50%); 
    cursor: pointer;
    border: 2px solid transparent; 
    transition: transform 0.1s, border-color 0.2s;
  }

  .color-chip.active { 
    border-color: var(--ink); 
    transform: scale(1.1);
  }

  /* Primary Button (Coral) */
  .btn {
    background: var(--primary); 
    color: var(--on-primary); 
    border: none; 
    border-radius: var(--rounded-md);
    padding: 12px 20px; 
    font-family: var(--font-body); 
    font-size: 14px; 
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    height: 40px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .btn:hover { background: var(--primary-active); }
  .btn:disabled { background: var(--primary-disabled); color: var(--muted); cursor: not-allowed; }
  
  .btn-row { display: flex; gap: 12px; margin-top: 24px; }
  
  /* Secondary Button (Cream) */
  .btn.secondary { 
    background: var(--canvas); 
    color: var(--ink);
    border: 1px solid var(--hairline);
  }
  .btn.secondary:hover { background: var(--surface-card); }

  .status { font-size: 13px; color: var(--muted); margin-top: 12px; min-height: 18px; font-weight: 500; }
  
  .export-section { margin-top: 24px; text-align: center; width: 100%; }
  
  .progress-bar {
    width: 100%; height: 6px; background: var(--hairline); border-radius: var(--rounded-pill, 9999px);
    margin-top: 12px; overflow: hidden; display: none;
  }
  .progress-bar .fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.1s; }
  
  /* Preview area for transparent export */
  .canvas-wrap.transparent { background: repeating-conic-gradient(var(--surface-dark-elevated) 0% 25%, var(--surface-dark) 0% 50%) 50%/16px 16px; }
</style>
</head>
<body>

<h1>✦ Claude Code Spinner</h1>
<p class="subtitle">Warm editorial interface · Code export tool</p>

<div class="main">
  <!-- Preview -->
  <div class="preview-section">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="canvas" width="400" height="80"></canvas>
    </div>
    <div class="export-section">
      <div class="btn-row">
        <button class="btn" id="btnExportGif" onclick="exportGif()">Export GIF</button>
        <button class="btn secondary" id="btnExportPng" onclick="exportPng()">Export PNG</button>
        <button class="btn secondary" id="btnToggleBg" onclick="toggleBg()">Transparent</button>
      </div>
      <div class="status" id="status"></div>
      <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <!-- Input -->
    <div class="control-group">
      <h3>Message</h3>
      <div class="control-row">
        <input type="text" id="inputText" placeholder="Leave empty for auto-cycle..." oninput="onInputChange()">
      </div>
    </div>

    <!-- Colors -->
    <div class="control-group">
      <h3>Brand Accent</h3>
      <div class="color-row" id="colorChips"></div>
      <div class="control-row" style="margin-top:20px">
        <label>Base</label>
        <input type="color" id="customMsg" value="#cc785c" onchange="onCustomColor()">
        <label style="margin-left:12px; width:auto">Highlight</label>
        <input type="color" id="customShim" value="#f5f0e8" onchange="onCustomColor()">
      </div>
    </div>

    <!-- Shimmer -->
    <div class="control-group">
      <h3>Shimmer Effect</h3>
      <div class="control-row">
        <label>Direction</label>
        <select id="shimDir" onchange="onControlChange()">
          <option value="rtl">← Right to Left</option>
          <option value="ltr">→ Left to Right</option>
        </select>
      </div>
      <div class="control-row">
        <label>Window</label>
        <input type="range" id="shimWidth" min="1" max="10" value="3" oninput="onControlChange()">
        <span class="value" id="shimWidthVal">3</span>
      </div>
      <div class="control-row">
        <label>Speed</label>
        <input type="range" id="shimSpeed" min="0.5" max="5" step="0.1" value="1.5" oninput="onControlChange()">
        <span class="value" id="shimSpeedVal">1.5s</span>
      </div>
      <div class="control-row">
        <label>Intensity</label>
        <input type="range" id="shimIntensity" min="0" max="100" value="100" oninput="onControlChange()">
        <span class="value" id="shimIntensityVal">100%</span>
      </div>
    </div>

    <!-- Animation -->
    <div class="control-group">
      <h3>Export Settings</h3>
      <div class="control-row">
        <label>Framerate</label>
        <input type="range" id="fps" min="5" max="30" value="15" oninput="onControlChange()">
        <span class="value" id="fpsVal">15 fps</span>
      </div>
      <div class="control-row">
        <label>Duration</label>
        <input type="range" id="gifDuration" min="1" max="10" step="0.5" value="3" oninput="onControlChange()">
        <span class="value" id="gifDurationVal">3s</span>
      </div>
      <div class="control-row">
        <label>Canvas W</label>
        <input type="range" id="canvasWidth" min="200" max="800" step="50" value="400" oninput="onResize()">
        <span class="value" id="canvasWidthVal">400</span>
      </div>
    </div>
  </div>
</div>

<script>
// === Spinner Config ===
const SPINNER_CHARS = ['·', '✢', '✳', '✶', '✻', '✽'];
const SPINNER_FRAMES = [...SPINNER_CHARS, ...[...SPINNER_CHARS].reverse()];

// Updated color scheme to match Anthropic Brand
const COLOR_SCHEMES = [
  { name: 'Anthropic Coral', message: [204,120,92],  shimmer: [250,249,245] }, // primary #cc785c to canvas
  { name: 'Warm Amber',      message: [232,165,90],  shimmer: [255,255,255] }, // accent-amber
  { name: 'Teal',            message: [93,184,166],  shimmer: [255,255,255] }, // accent-teal
  { name: 'Canvas Muted',    message: [142,139,130], shimmer: [250,249,245] }, // muted-soft
  { name: 'On-Dark Cream',   message: [250,249,245], shimmer: [204,120,92]  }, // canvas to coral shimmer
];

const DEFAULT_VERBS = [
  'Accomplishing','Baking','Brewing','Calculating','Cascading','Clauding',
  'Cogitating','Composing','Computing','Crafting','Creating','Crunching',
  'Deciphering','Elucidating','Envisioning','Fermenting','Flowing','Forging',
  'Generating','Harmonizing','Hatching','Ideating','Imagining','Kneading',
  'Manifesting','Marinating','Nebulizing','Orchestrating','Percolating',
  'Pondering','Processing','Quantumizing','Ruminating','Synthesizing',
  'Thinking','Tinkering','Warping','Whisking','Wrangling','Zigzagging',
];

// === State ===
let state = {
  text: '',
  verb: randomVerb(),
  tick: 0,
  colorIdx: 0,
  customMsg: null,
  customShim: null,
  shimDir: 'rtl',
  shimWidth: 3,
  shimSpeed: 1.5,
  shimIntensity: 1.0,
  fps: 15,
  gifDuration: 3,
  canvasWidth: 400,
  transparentBg: false,
};

let lastSweepId = -1;
let animId = null;
let lastFrameTime = 0;

// === DOM ===
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function randomVerb() {
  return DEFAULT_VERBS[Math.floor(Math.random() * DEFAULT_VERBS.length)];
}

function getMessageColor() {
  if (state.customMsg) return state.customMsg;
  return COLOR_SCHEMES[state.colorIdx].message;
}

function getShimmerColor() {
  if (state.customShim) return state.customShim;
  return COLOR_SCHEMES[state.colorIdx].shimmer;
}

// === Color utils ===
function rgb(c) { return `rgb(${c[0]},${c[1]},${c[2]})`; }
function lerpColor(c1, c2, t) {
  return [
    Math.round(c1[0] + (c2[0]-c1[0])*t),
    Math.round(c1[1] + (c2[1]-c1[1])*t),
    Math.round(c1[2] + (c2[2]-c1[2])*t),
  ];
}

// === Shimmer math ===
function computeGlimmerIndex(tick, msgWidth, dir, padding) {
  const cycle = msgWidth + padding * 2;
  if (dir === 'ltr') return (tick % cycle) - padding;
  return msgWidth + padding - (tick % cycle);
}

function computeSegments(text, glimmerIdx, windowWidth) {
  const half = Math.floor(windowWidth / 2);
  const start = glimmerIdx - half;
  const end = glimmerIdx + (windowWidth - half - 1);
  if (start >= text.length || end < 0) return { before: text, shimmer: '', after: '' };
  const cs = Math.max(0, start);
  let before='', shimmer='', after='';
  for (let i = 0; i < text.length; i++) {
    if (i < cs) before += text[i];
    else if (i > end) after += text[i];
    else shimmer += text[i];
  }
  return { before, shimmer, after };
}

// === Pre-calculate fixed glyph width ===
let GLYPH_WIDTH = 0;
function measureGlyphWidth() {
  const c = document.createElement('canvas').getContext('2d');
  c.font = '28px "JetBrains Mono", monospace';
  let max = 0;
  for (const ch of SPINNER_FRAMES) {
    max = Math.max(max, c.measureText(ch).width);
  }
  GLYPH_WIDTH = max + 2; 
}
measureGlyphWidth();

// === Render ===
function render() {
  const W = state.canvasWidth;
  const H = 80;

  if (canvas.width !== W || canvas.height !== H) {
    canvas.width = W;
    canvas.height = H;
  }

  // Background updated to var(--surface-dark)
  if (!state.transparentBg) {
    ctx.fillStyle = '#181715'; 
    ctx.fillRect(0, 0, W, H);
  } else {
    ctx.clearRect(0, 0, W, H);
  }

  const display = state.text.trim() || state.verb;
  const fullText = display + '…';
  const frame = Math.floor(state.tick / 2) % SPINNER_FRAMES.length;
  const spinnerChar = SPINNER_FRAMES[frame];
  const msgColor = getMessageColor();
  const shimColor = getShimmerColor();

  const cycleLen = fullText.length + 20;
  const ticksPerSweep = Math.max(1, Math.round(state.shimSpeed * 1000 / (1000 / state.fps)));
  const scaledTick = state.tick * cycleLen / ticksPerSweep;
  const glimmerIdx = computeGlimmerIndex(scaledTick, fullText.length, state.shimDir, 10);
  const segs = computeSegments(fullText, glimmerIdx, state.shimWidth);

  const effShimmer = state.shimIntensity >= 1
    ? shimColor
    : lerpColor(msgColor, shimColor, state.shimIntensity);

  ctx.textBaseline = 'middle';
  const y = H / 2;
  let x = 24;

  ctx.font = '24px "JetBrains Mono", monospace';
  ctx.fillStyle = rgb(msgColor);
  const charW = ctx.measureText(spinnerChar).width;
  ctx.fillText(spinnerChar, x + (GLYPH_WIDTH - charW) / 2, y);
  x += GLYPH_WIDTH + 16;

  ctx.font = '16px "JetBrains Mono", monospace';
  if (segs.before) {
    ctx.fillStyle = rgb(msgColor);
    ctx.fillText(segs.before, x, y);
    x += ctx.measureText(segs.before).width;
  }
  if (segs.shimmer) {
    ctx.fillStyle = rgb(effShimmer);
    ctx.fillText(segs.shimmer, x, y);
    x += ctx.measureText(segs.shimmer).width;
  }
  if (segs.after) {
    ctx.fillStyle = rgb(msgColor);
    ctx.fillText(segs.after, x, y);
  }
}

// === Animation loop ===
function animate(time) {
  if (time - lastFrameTime >= 1000 / state.fps) {
    lastFrameTime = time;

    const display = state.text.trim() || state.verb;
    const isUserInput = !!state.text.trim();

    if (!isUserInput) {
      const ticksPerSweep = Math.max(1, Math.round(state.shimSpeed * 1000 / (1000/state.fps)));
      const sweepId = Math.floor(state.tick / ticksPerSweep);
      if (sweepId > 0 && sweepId !== lastSweepId) {
        lastSweepId = sweepId;
        state.verb = randomVerb();
        state.tick = 0;
        lastSweepId = -1;
      }
    }

    render();
    state.tick++;
  }
  animId = requestAnimationFrame(animate);
}

// === Controls ===
function initColorChips() {
  const container = document.getElementById('colorChips');
  COLOR_SCHEMES.forEach((scheme, i) => {
    const chip = document.createElement('div');
    chip.className = 'color-chip' + (i === 0 ? ' active' : '');
    chip.style.background = rgb(scheme.message);
    chip.title = scheme.name;
    chip.onclick = () => {
      state.colorIdx = i;
      state.customMsg = null;
      state.customShim = null;
      document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
    };
    container.appendChild(chip);
  });
}

function onInputChange() {
  state.text = document.getElementById('inputText').value;
}

function onCustomColor() {
  const msg = document.getElementById('customMsg').value;
  const shim = document.getElementById('customShim').value;
  state.customMsg = hexToRgb(msg);
  state.customShim = hexToRgb(shim);
  document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('active'));
}

function hexToRgb(hex) {
  const m = hex.match(/^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
  return m ? [parseInt(m[1],16), parseInt(m[2],16), parseInt(m[3],16)] : [204,120,92];
}

function onControlChange() {
  state.shimDir = document.getElementById('shimDir').value;
  state.shimWidth = +document.getElementById('shimWidth').value;
  state.shimSpeed = +document.getElementById('shimSpeed').value;
  state.shimIntensity = +document.getElementById('shimIntensity').value / 100;
  state.fps = +document.getElementById('fps').value;
  state.gifDuration = +document.getElementById('gifDuration').value;

  document.getElementById('shimWidthVal').textContent = state.shimWidth;
  document.getElementById('shimSpeedVal').textContent = state.shimSpeed.toFixed(1) + 's';
  document.getElementById('shimIntensityVal').textContent = Math.round(state.shimIntensity*100) + '%';
  document.getElementById('fpsVal').textContent = state.fps + ' fps';
  document.getElementById('gifDurationVal').textContent = state.gifDuration + 's';
}

function onResize() {
  state.canvasWidth = +document.getElementById('canvasWidth').value;
  document.getElementById('canvasWidthVal').textContent = state.canvasWidth;
}

function toggleBg() {
  state.transparentBg = !state.transparentBg;
  document.getElementById('canvasWrap').classList.toggle('transparent', state.transparentBg);
  document.getElementById('btnToggleBg').textContent = state.transparentBg ? 'Opaque' : 'Transparent';
}

// === GIF Export ===
function exportGif() {
  const btn = document.getElementById('btnExportGif');
  const status = document.getElementById('status');
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');

  btn.disabled = true;
  status.textContent = 'Generating GIF...';
  bar.style.display = 'block';
  fill.style.width = '0%';

  const savedTick = state.tick;
  const totalFrames = Math.round(state.gifDuration * state.fps);
  const delayMs = Math.round(1000 / state.fps);
  const w = canvas.width, h = canvas.height;

  const frameData = [];
  for (let i = 0; i < totalFrames; i++) {
    state.tick = i;
    render();
    const imgData = ctx.getImageData(0, 0, w, h);
    frameData.push(new Uint8Array(imgData.data));
    fill.style.width = Math.round((i+1) / totalFrames * 40) + '%';
  }

  setTimeout(() => {
    try {
      const gif = new GIFEncoder(w, h);
      gif.setRepeat(0); 
      gif.setDelay(delayMs);

      frameData.forEach((rgba, i) => {
        gif.addFrame(rgba, state.transparentBg);
        fill.style.width = Math.round(40 + (i+1) / totalFrames * 60) + '%';
      });

      const blob = gif.toBlob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'claude-spinner.gif';
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      status.textContent = `✓ Exported (${totalFrames} frames, ${state.gifDuration}s)`;
    } catch(e) {
      console.error(e);
      status.textContent = 'Export failed: ' + e.message;
    }
    btn.disabled = false;
    bar.style.display = 'none';
    state.tick = savedTick;
  }, 50);
}

function exportPng() {
  render();
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'claude-spinner.png';
  a.click();
}
